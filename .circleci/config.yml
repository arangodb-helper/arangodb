version: 2.1

parameters:
  goImage:
    type: string
    default: "gcr.io/gcr-for-testing/golang:1.25.10"
  arangodbImage:
    type: string
    default: "gcr.io/gcr-for-testing/arangodb/enterprise:latest"
  alpineImage:
    type: string
    default: "gcr.io/gcr-for-testing/alpine:3.23"
  starterModes:
    type: string
    default: "single,cluster"
  test-options:
    type: string
    default: ""
  # Empty by default. Set via "Trigger Pipeline" (e.g. prerelease-patch, release-minor).
  # Runs on whichever branch the pipeline is triggered on (including feature branches).
  publish:
    type: string
    default: ""
  # When false, Docker push omits :latest and the floating major :x; still pushes :<VERSION> and :x.y.
  # Use for 0.18.x while :latest (and the major line tag) stay on 0.19.x (parameter name is historical).
  update_starter_latest_tag:
    type: boolean
    default: true

executors:
  golang-executor:
    docker:
      - image: gcr.io/gcr-for-testing/golang:1.25.10
  machine-executor:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true

jobs:
  check-code:
    executor: golang-executor
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout
      - run: make init
      - run: make check
      - run: make binaries
      - run: make vulncheck

  run-tests:
    executor: machine-executor
    resource_class: large
    steps:
      - checkout
      - run:
          name: Run integration tests (Docker + local process)
          command: |
            if [ -z "${CIRCLE_PULL_REQUEST:-}" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
            export IP=$(hostname -I | awk '{print $1}')
            export ARANGODB="<< pipeline.parameters.arangodbImage >>"
            export GOIMAGE="<< pipeline.parameters.goImage >>"
            export ALPINE_IMAGE="<< pipeline.parameters.alpineImage >>"
            export STARTER_MODES="<< pipeline.parameters.starterModes >>"
            export DOCKER_PLATFORMS="linux/amd64"
            export VERBOSE=1
            export TESTOPTIONS="<< pipeline.parameters.test-options >>"
            make init
            make run-tests
      - run:
          name: Debug on failure
          when: on_fail
          command: |
            docker ps -a || true
            docker images | head -n 30 || true

  release-starter:
    executor: machine-executor
    resource_class: large
    steps:
      - checkout
      - run:
          name: Install Go (match project toolchain)
          command: |
            set -euo pipefail
            GO_VERSION="1.25.10"
            if command -v go >/dev/null 2>&1 && [ "$(go env GOVERSION)" = "go${GO_VERSION}" ]; then
              echo "Go ${GO_VERSION} already default"
              exit 0
            fi
            curl -sSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tgz
            sudo rm -rf /usr/local/go
            sudo tar -C /usr/local -xzf /tmp/go.tgz
            echo 'export PATH=/usr/local/go/bin:$PATH' >> "$BASH_ENV"
            go version
      - run:
          name: Publish release (see MAINTAINERS.md)
          command: |
            set -euo pipefail

            if [ -z "${DOCKER_HUB_USER:-}" ] || [ -z "${DOCKER_HUB_PASSWORD:-}" ]; then
              echo "Docker Hub credentials missing: set DOCKER_HUB_USER and DOCKER_HUB_PASSWORD (docker-hub context)."
              exit 1
            fi
            if [ -z "${RELEASER_GITHUB_TOKEN:-}" ]; then
              echo "RELEASER_GITHUB_TOKEN missing: add it to the github-release context."
              exit 1
            fi

            echo "${DOCKER_HUB_PASSWORD}" | docker login -u "${DOCKER_HUB_USER}" --password-stdin

            # Multi-arch push from amd64: QEMU for linux/arm64 only (pinned image, not :latest).
            docker run --privileged --rm tonistiigi/binfmt:qemu-v10.2.1-65 --install arm64
            docker buildx version
            docker buildx rm -f arangodb-starter-ci 2>/dev/null || true
            docker buildx create --name arangodb-starter-ci --driver docker-container --use
            docker buildx inspect --bootstrap

            (
              export GITHUB_TOKEN="${RELEASER_GITHUB_TOKEN}"
              export PATH="/usr/local/go/bin:${PATH}"

              git config --global user.email "team.go@arangodb.com"
              git config --global user.name "arangodb-helpers-ci"
              git config --global safe.directory "$(pwd)"
              # Git 2.37+: plain "git push" sets upstream when missing (release tool uses "git push" after commit).
              git config --global push.autoSetupRemote true

              git remote set-url origin "https://${GITHUB_TOKEN}@github.com/arangodb-helper/arangodb"

              # Uncomment if builds need private https://github.com/arangodb/* modules:
              # git config --global url."https://${GITHUB_TOKEN}@github.com/arangodb/".insteadOf "https://github.com/arangodb/"

              make init

              export DOCKER_PLATFORMS=linux/amd64,linux/arm64

              if [ "<< pipeline.parameters.update_starter_latest_tag >>" != "true" ]; then
                export STARTER_TAGS_SKIP_LATEST=1
                echo ">> STARTER_TAGS_SKIP_LATEST=1 (skipping :latest and :x; still pushing :<VERSION> and :x.y)"
              fi

              make "<< pipeline.parameters.publish >>"
            )

workflows:
  check_quick:
    jobs:
      - check-code

  ci:
    jobs:
      - run-tests

  publish-release-starter:
    when:
      matches:
        value: << pipeline.parameters.publish >>
        pattern: "^prerelease-major|prerelease-minor|prerelease-patch|release-major|release-minor|release-patch$"
    jobs:
      - release-starter:
          context:
            - github-release
            - docker-hub